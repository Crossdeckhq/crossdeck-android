# Gradle JVM heap — needed for AGP 8.x.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# AndroidX (required by AGP 8+ and androidx.lifecycle).
android.useAndroidX=true

# Parallel project execution — single module today, but keeps the
# door open for a v1.1 split (e.g. crossdeck-billing for Play
# Billing) without reconfiguring.
org.gradle.parallel=true

# Configuration cache — Gradle 8 default. Off for now while we
# verify the build is reproducible; v1.1 will flip on.
org.gradle.configuration-cache=false
